version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: hf-postgres
    environment:
      POSTGRES_DB: hf_db
      POSTGRES_USER: hf_user
      POSTGRES_PASSWORD: hf_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hf_user -d hf_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
