<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라운드 페이 회원정보조회</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --line: #d1d5db;
            --head: #f9fafb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #1f4f8f;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .breadcrumb {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 20px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 28px;
        }

        .help {
            padding: 12px 14px;
            border-radius: 8px;
            background: #eef4ff;
            border: 1px solid #d4e3ff;
            margin-bottom: 14px;
            color: #334155;
            font-size: 13px;
            line-height: 1.5;
        }

        .filters {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: #fcfcfd;
            margin-bottom: 14px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .row:last-child { margin-bottom: 0; }

        .label {
            min-width: 80px;
            font-size: 13px;
            font-weight: 700;
            color: #374151;
        }

        input, select {
            height: 32px;
            border: 1px solid #c7ced8;
            border-radius: 6px;
            padding: 0 8px;
            background: #fff;
            font-size: 13px;
        }

        .text-sm { width: 130px; }
        .text-md { width: 180px; }

        .radio {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 6px;
            font-size: 13px;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .btn {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #9ca3af;
            border-radius: 6px;
            background: #fff;
            color: #1f2937;
            font-size: 13px;
            cursor: pointer;
        }

        .btn.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .list-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0 8px;
            font-size: 13px;
        }

        .list-head strong { font-size: 14px; }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 12px;
        }

        th, td {
            border: 1px solid var(--line);
            padding: 8px 6px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            background: var(--head);
            font-weight: 700;
        }

        .pager {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: #4b5563;
        }

        .page-links {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .page-links a {
            text-decoration: none;
            color: #4b5563;
            border: 1px solid var(--line);
            padding: 2px 8px;
            border-radius: 4px;
            background: #fff;
        }

        .page-links a.active {
            color: #fff;
            border-color: var(--primary);
            background: var(--primary);
        }

        .link {
            margin-top: 12px;
        }

        .link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .container { padding: 14px; }
            .panel { padding: 14px; }
            table { font-size: 11px; }
            .row { gap: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="breadcrumb">관리자 &gt; 라운드 페이 회원 관리 &gt; 회원정보조회</div>

    <section class="panel">
        <h1>라운드 페이 회원정보조회</h1>

        <div class="help">
            정책 기준에 따른 회원 조회 화면입니다. 가입일, 회원 조회 조건, 생년월일, 성별, 회원 상태, 이용 제한 조건으로 검색할 수 있습니다.
        </div>

        <form class="filters" method="get" th:action="@{/admin/ia/member-info}">
            <input type="hidden" name="page" value="1">

            <div class="row">
                <span class="label">가입일</span>
                <input class="text-sm" type="text" name="joinedFrom" placeholder="yyyy-mm-dd" th:value="${criteria.joinedFrom}">
                <span>~</span>
                <input class="text-sm" type="text" name="joinedTo" placeholder="yyyy-mm-dd" th:value="${criteria.joinedTo}">
            </div>

            <div class="row">
                <span class="label">회원 조회</span>
                <select name="searchType">
                    <option value="PHONE" th:selected="${criteria.searchType == 'PHONE'}">휴대폰번호</option>
                    <option value="NAME" th:selected="${criteria.searchType == 'NAME'}">이름</option>
                    <option value="CUSTOMER_ID" th:selected="${criteria.searchType == 'CUSTOMER_ID'}">고객ID</option>
                </select>
                <input class="text-md" type="text" name="keyword" placeholder="검색어 입력" th:value="${criteria.keyword}">

                <span class="label">생년월일</span>
                <input class="text-sm" type="text" name="birthDate" placeholder="YY" th:value="${criteria.birthDate}">

                <span class="label">성별</span>
                <label class="radio"><input type="radio" name="gender" value="ALL" th:checked="${criteria.gender == 'ALL'}">전체</label>
                <label class="radio"><input type="radio" name="gender" value="M" th:checked="${criteria.gender == 'M'}">남</label>
                <label class="radio"><input type="radio" name="gender" value="F" th:checked="${criteria.gender == 'F'}">여</label>
            </div>

            <div class="row">
                <span class="label">회원 상태</span>
                <label class="radio"><input type="radio" name="memberStatus" value="ALL" th:checked="${criteria.memberStatus == 'ALL'}">전체</label>
                <label class="radio"><input type="radio" name="memberStatus" value="REGULAR" th:checked="${criteria.memberStatus == 'REGULAR'}">정회원</label>
                <label class="radio"><input type="radio" name="memberStatus" value="PRE_REGULAR" th:checked="${criteria.memberStatus == 'PRE_REGULAR'}">준회원</label>
                <label class="radio"><input type="radio" name="memberStatus" value="WITHDRAW_ERROR" th:checked="${criteria.memberStatus == 'WITHDRAW_ERROR'}">탈퇴오류</label>

                <span class="label">이용 제한</span>
                <label class="radio"><input type="radio" name="restriction" value="ALL" th:checked="${criteria.restriction == 'ALL'}">전체</label>
                <label class="radio"><input type="radio" name="restriction" value="NORMAL" th:checked="${criteria.restriction == 'NORMAL'}">정상</label>
                <label class="radio"><input type="radio" name="restriction" value="ADMIN_LIMITED" th:checked="${criteria.restriction == 'ADMIN_LIMITED'}">관리자 제한</label>
            </div>

            <div class="actions">
                <a class="btn btn-link" th:href="@{/admin/ia/member-info}">초기화</a>
                <button class="btn primary" type="submit">검색</button>
            </div>
        </form>

        <div class="list-head">
            <strong th:text="|총 ${result.totalCount}건, 검색결과 ${result.filteredCount}건|"></strong>
            <div>
                페이지당
                <select onchange="window.location.href=this.value">
                    <option
                        th:value="@{/admin/ia/member-info(page=1,size=10,joinedFrom=${criteria.joinedFrom},joinedTo=${criteria.joinedTo},searchType=${criteria.searchType},keyword=${criteria.keyword},birthDate=${criteria.birthDate},gender=${criteria.gender},memberStatus=${criteria.memberStatus},restriction=${criteria.restriction})}"
                        th:selected="${criteria.size == 10}">10</option>
                    <option
                        th:value="@{/admin/ia/member-info(page=1,size=20,joinedFrom=${criteria.joinedFrom},joinedTo=${criteria.joinedTo},searchType=${criteria.searchType},keyword=${criteria.keyword},birthDate=${criteria.birthDate},gender=${criteria.gender},memberStatus=${criteria.memberStatus},restriction=${criteria.restriction})}"
                        th:selected="${criteria.size == 20}">20</option>
                    <option
                        th:value="@{/admin/ia/member-info(page=1,size=50,joinedFrom=${criteria.joinedFrom},joinedTo=${criteria.joinedTo},searchType=${criteria.searchType},keyword=${criteria.keyword},birthDate=${criteria.birthDate},gender=${criteria.gender},memberStatus=${criteria.memberStatus},restriction=${criteria.restriction})}"
                        th:selected="${criteria.size == 50}">50</option>
                </select>
                <button class="btn" type="button">엑셀 다운로드</button>
            </div>
        </div>

        <table>
            <thead>
            <tr>
                <th>가입일시</th>
                <th>이름</th>
                <th>휴대폰번호</th>
                <th>고객ID</th>
                <th>생년월일</th>
                <th>성별</th>
                <th>회원 구분</th>
                <th>정회원 전환 일시</th>
                <th>이용 제한</th>
                <th>유입 채널</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(result.members)}">
                <td colspan="11">조회 결과가 없습니다.</td>
            </tr>
            <tr th:each="member : ${result.members}">
                <td th:text="${member.joinedAt}"></td>
                <td th:text="${member.name}"></td>
                <td th:text="${member.phone}"></td>
                <td th:text="${member.customerId}"></td>
                <td th:text="${member.birthDate}"></td>
                <td th:text="${member.gender}"></td>
                <td th:text="${member.memberStatus}"></td>
                <td th:text="${member.convertedAt}"></td>
                <td th:text="${member.restriction}"></td>
                <td th:text="${member.inflowChannel}"></td>
                <td><button class="btn" type="button">수정</button></td>
            </tr>
            </tbody>
        </table>

        <div class="pager">
            <span th:text="|${result.pageStart}-${result.pageEnd} / ${result.filteredCount}|"></span>

            <div class="page-links">
                <a th:if="${result.hasPrev}"
                   th:href="@{/admin/ia/member-info(page=${result.currentPage - 1},size=${criteria.size},joinedFrom=${criteria.joinedFrom},joinedTo=${criteria.joinedTo},searchType=${criteria.searchType},keyword=${criteria.keyword},birthDate=${criteria.birthDate},gender=${criteria.gender},memberStatus=${criteria.memberStatus},restriction=${criteria.restriction})}">이전</a>

                <a th:each="p : ${result.pageNumbers}"
                   th:text="${p}"
                   th:classappend="${p == result.currentPage} ? 'active' : ''"
                   th:href="@{/admin/ia/member-info(page=${p},size=${criteria.size},joinedFrom=${criteria.joinedFrom},joinedTo=${criteria.joinedTo},searchType=${criteria.searchType},keyword=${criteria.keyword},birthDate=${criteria.birthDate},gender=${criteria.gender},memberStatus=${criteria.memberStatus},restriction=${criteria.restriction})}"></a>

                <a th:if="${result.hasNext}"
                   th:href="@{/admin/ia/member-info(page=${result.currentPage + 1},size=${criteria.size},joinedFrom=${criteria.joinedFrom},joinedTo=${criteria.joinedTo},searchType=${criteria.searchType},keyword=${criteria.keyword},birthDate=${criteria.birthDate},gender=${criteria.gender},memberStatus=${criteria.memberStatus},restriction=${criteria.restriction})}">다음</a>
            </div>
        </div>

        <div class="link">
            <a th:href="@{/admin}">관리자 홈으로 이동</a>
        </div>
    </section>
</div>
</body>
</html>
